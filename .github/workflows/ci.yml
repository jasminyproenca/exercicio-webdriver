name: CI — Testes Automatizados

# ─────────────────────────────────────────────
# TRIGGERS: quando a pipeline será executada
# ─────────────────────────────────────────────
on:
  # 1. Execução por push em qualquer branch
  push:
    branches:
      - '**'

  # 2. Execução manual pelo painel do GitHub Actions
  workflow_dispatch:

  # 3. Execução agendada — todo dia às 14:00 horário de Brasília (17:00 UTC)
  schedule:
    - cron: '0 17 * * *'

# ─────────────────────────────────────────────
# JOBS: etapas que serão executadas na pipeline
# ─────────────────────────────────────────────
jobs:
  testes:
    name: Executar Testes com Selenium
    runs-on: ubuntu-latest  # Máquina virtual Linux fornecida pelo GitHub

    steps:
      # 1. Faz o checkout do código do repositório
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      # 2. Configura o Node.js na versão 20 (LTS)
      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # Faz cache dos pacotes npm para acelerar futuras execuções

      # 3. Instala Chrome e ChromeDriver compatíveis entre si
      #    (evita erros de versão incompatível entre browser e driver)
      - name: 🌐 Instalar Google Chrome e ChromeDriver
        uses: browser-actions/setup-chrome@v1

      # 4. Instala as dependências do projeto (usa package-lock.json para instalação determinística)
      - name: 📦 Instalar dependências
        run: npm ci

      # 5. Executa os testes com o reporter Mochawesome
      #    A variável CI=true (definida automaticamente pelo GitHub Actions)
      #    ativa o modo headless no login.test.js
      - name: 🧪 Executar testes
        run: npm run test:ci

      # 6. Faz upload do relatório HTML como artifact da pipeline
      #    O relatório fica disponível para download por 30 dias
      - name: 📊 Publicar relatório de testes
        if: always()  # Sempre publica o relatório, mesmo se os testes falharem
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: mochawesome-report/
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 2: Notificação no Telegram
  # ─────────────────────────────────────────────
  notificar:
    name: Notificar resultado no Telegram
    runs-on: ubuntu-latest
    needs: testes          # Aguarda o job de testes terminar
    if: always()           # Executa mesmo se os testes falharem

    steps:
      # Define o ícone e status com base no resultado do job de testes
      - name: 📬 Enviar notificação no Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ needs.testes.result }}
        run: |
          # Define emoji e texto conforme resultado
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            TEXTO="Testes passaram com sucesso!"
          else
            EMOJI="❌"
            TEXTO="Testes falharam. Verifique os logs."
          fi

          # Monta e envia a mensagem via API do Telegram
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="${EMOJI} <b>Pipeline CI — exercicio-webdriver</b>
          
          📌 <b>Status:</b> ${TEXTO}
          🌿 <b>Branch:</b> ${{ github.ref_name }}
          👤 <b>Autor:</b> ${{ github.actor }}
          🕐 <b>Horário:</b> $(date -u '+%d/%m/%Y %H:%M') UTC
          
          🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Ver resultado completo</a>"
